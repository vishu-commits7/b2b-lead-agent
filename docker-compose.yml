services:
  app:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./leadagent.db:/app/leadagent.db
    command: streamlit run login.py --server.port=8501 --server.address=0.0.0.0

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./leadagent.db:/app/leadagent.db
    command: uvicorn api.server:app --host 0.0.0.0 --port 8000
